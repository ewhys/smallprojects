<!DOCTYPE html>
<html>
<body>
<h1 id="h"></h1>

<canvas id="myCanvas" width="500" height="500" style = "border:1px solid black">

</canvas>

<button onclick= "random()">Random</button>
<button onclick = "cool()">Cool</button>
<button onclick = "hot()">Hot</button>

<script>
  

  function random()
  {
    create ("random");
  }
  function cool ()
  {
    create ("cool");
  }
  function hot ()
  {
    create ("hot");
  }
let canvas = document.getElementById("myCanvas");
let ctx = canvas.getContext("2d");


//int [] overall = {middle, middle, old dimension, new dimension};
let overall = [250, 250, 1, 1];
// int [] current = { x, y };
let current = [1, 1];


let turn = 1;
let temp;
let restart = Math.floor (Math.random () * 4 + 1);
// turn is old number
function create (c) {
drawRectangle (0, 0, 500, 500, c);
turn = 1;
restart = Math.floor (Math.random () * 4 + 1);
current = [1,1];
overall = [250, 250, 1, 1];
let size = Math.random () * 1.5 + 1
for (let i = 0; i < 20; i++) 
{
  updateRectangle (turn);
  drawRectangle (current [0], current [1] , overall [3]/(size), overall [3]/(size), c);
  updateDimension ();
  updateTurn (restart);
}

}
function updateRectangle (turn) 
{
  if (turn == 1)
  {
    //x = x + old dimention
    current [0] = (overall [0] + overall [2]);
    current [1] = overall [1];
    //  overall same
    
    
  }
  else if (turn == 2) // overall [1] + overall [3]
  {
    //y = y - new dimention
    current [1] = (overall [1] - overall [3]);
    current [0] = overall [0];
    // overall equals rectangle coordinates
    overall [0] = current [0];
    overall [1] = current [1];
  }
  else if (turn == 3)
  {
    //x = x - new dimention
    current [0] = (overall [0] - overall [3]) ;
    current [1] = overall [1];
    //overall equals rectangle coordinates
    overall [0] = current [0];
    overall [1] = current [1];
  }
  else
  {
    //y = y + old dimention
    current [1] = (overall [1] + overall [2]);
    current [0] = overall [0];
    //overall same value
  }
}

function drawRectangle (x, y, d1, d2, c)
{
  
  //ctx.rect (x, y, new dimention, new dimention);
  //ctx.rect (current [0], current [1], overall [3], overall [3]);
  //make rectangle
  //ctx.stroke ();
  let r = 20;
  let g = 20;
  let b = 20;
  if (c == "random")
  {
    
    r = Math.random () * 226 + 0;
    g = Math.random () * 226 + 0;
    b = Math.random () * 226 + 0;
  }
  else if (c == "hot")
  {
    r = Math.random () * 133 + 133;
    g = Math.random () * 200;
    b = Math.random () * 200;
  }
  else
  {
    r = Math.random () * 200;
    g = Math.random () * 200;
    b = Math.random () * 133 + 133; 
  }
  let color = "rgb(" + r + " " + g + " " + b + ")";
  ctx.fillStyle = color;
  ctx.fillRect (x, y, d1, d2);
}

function updateDimension ()
{
  //var temp = new dimension
  temp = overall [3];
  //new dimension = old dimension + new dimension;
  overall [3] = overall [3] + overall [2];
  //old dimension = new dimension;
  overall [2] = temp;
}

function updateTurn (restart)
{
  turn += 1;
  if (turn == 5) 
  {
    turn = restart;
  }
}

//****Syntax reminders****
//ctx.rect (0, 0, 100, 100);
//ctx.stroke ();


//ctx.fillStyle = "pink";
//ctx.fillRect(0,0, 100,100, );
</script> 



</body>
</html>
